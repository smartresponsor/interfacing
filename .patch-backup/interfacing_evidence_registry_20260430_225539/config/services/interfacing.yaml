  App\Interfacing\Service\Interfacing\Registry\ScreenRegistry:
    arguments:
      $provider: !tagged_iterator interfacing.screen_provider
  App\Interfacing\Service\Interfacing\Action\ActionRegistry:
    arguments:
      $provider: !tagged_iterator interfacing.action_provider
  App\Interfacing\Service\Interfacing\Action\ActionDispatcher: ~
  App\Interfacing\Service\Interfacing\ActionCatalog:
    arguments:
      $endpoint: !tagged_iterator interfacing.action
  App\Interfacing\Service\Interfacing\Demo\DemoPingAction: ~
