services:
  SmartResponsor\Interfacing\:
    resource: '../src/'
    exclude:
      - '../src/Kernel.php'

  SmartResponsor\Interfacing\Infra\Interfacing\Security\InterfacingPermissionVoter:
    tags:
      - { name: security.voter }

  SmartResponsor\Interfacing\Service\Interfacing\Tenant\DefaultTenantResolver:
    arguments:
      $defaultTenantId: '%env(string:SR_TENANT_DEFAULT)%'

  SmartResponsor\Interfacing\Service\Interfacing\Audit\MonologAuditSink:
    arguments:
      $logger: '@monolog.logger.interfacing'
