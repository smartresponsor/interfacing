services:
  # RVE-A2: enforce thin controllers by delegating orchestration to a view builder (service layer).
  App\Service\Interfacing\View\ScreenViewBuilder: ~

  App\ServiceInterface\Interfacing\View\ScreenViewBuilderInterface:
    alias: App\Service\Interfacing\View\ScreenViewBuilder

  App\Service\Interfacing\View\UiErrorMapper: ~

  App\ServiceInterface\Interfacing\View\UiErrorMapperInterface:
    alias: App\Service\Interfacing\View\UiErrorMapper

  App\Service\Interfacing\Metric\InMemoryUiMetric: ~

  App\ServiceInterface\Interfacing\Metric\UiMetricInterface:
    alias: App\Service\Interfacing\Metric\InMemoryUiMetric

  App\Service\Interfacing\Doctor\DoctorReportNormalizer: ~

  App\ServiceInterface\Interfacing\Doctor\DoctorReportNormalizerInterface:
    alias: App\Service\Interfacing\Doctor\DoctorReportNormalizer

  # Ensure JSON doctor uses the same builder contract aliasing.
  App\Support\Console\InterfacingDoctorJsonCommand: ~

  App\Application\Security\InterfacingPermissionVoter:
    tags:
      - { name: security.voter }

  App\Service\Interfacing\Tenant\DefaultTenantResolver:
    arguments:
      $defaultTenantId: '%env(string:SR_TENANT_DEFAULT)%'

  App\Service\Interfacing\Audit\MonologAuditSink:
    arguments:
      $logger: '@Psr\Log\NullLogger'
