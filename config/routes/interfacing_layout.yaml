interfacing_layout_index:
  path: /interfacing/layout
  controller: App\Presentation\Controller\Interfacing\LayoutController::show
  defaults:
    slug: home

interfacing_layout_show:
  path: /interfacing/layout/{slug}
  controller: App\Presentation\Controller\Interfacing\LayoutController::show
  requirements:
    slug: '[a-z0-9][a-z0-9\-]{0,47}'
