interfacing_index:
  path: /interfacing
  controller: App\Interfacing\Presentation\Controller\Interfacing\LayoutController::show
  defaults:
    slug: home

interfacing_layout_index:
  path: /interfacing
  controller: App\Interfacing\Presentation\Controller\Interfacing\LayoutController::show
  defaults:
    slug: home

interfacing_layout_show:
  path: /interfacing/{slug}
  controller: App\Interfacing\Presentation\Controller\Interfacing\LayoutController::show
  requirements:
    slug: '[a-z0-9][a-z0-9._-]{0,63}'

interfacing_layout_message_digest:
  path: /message/digest
  controller: App\Interfacing\Presentation\Controller\Interfacing\LayoutController::show
  defaults:
    slug: message.digest

interfacing_layout_message_notifications_inbox:
  path: /message/notifications/inbox
  controller: App\Interfacing\Presentation\Controller\Interfacing\LayoutController::show
  defaults:
    slug: message.notifications.inbox

interfacing_layout_message_search_results:
  path: /message/search/results
  controller: App\Interfacing\Presentation\Controller\Interfacing\LayoutController::show
  defaults:
    slug: message.search.results

interfacing_layout_message_rooms_collection:
  path: /message/rooms/collection
  controller: App\Interfacing\Presentation\Controller\Interfacing\LayoutController::show
  defaults:
    slug: message.rooms.collection
