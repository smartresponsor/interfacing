# Generic Smart Responsor CRUD bridge.
# Keep this file late in config/routes/* so component-specific routes win first.

app_crud_new:
  path: /{resourcePath}/new/
  controller: App\Interfacing\Presentation\Controller\Interfacing\GenericCrudWorkbenchController::show
  methods: [GET]
  defaults:
    _crud_operation: new
    _crud_surface: admin
  requirements:
    resourcePath: '(?!interfacing(?:/|$)|_profiler(?:/|$)|_wdt(?:/|$))[a-z0-9][a-z0-9/-]{0,120}'

app_crud_edit:
  path: /{resourcePath}/edit/{id}
  controller: App\Interfacing\Presentation\Controller\Interfacing\GenericCrudWorkbenchController::show
  methods: [GET]
  defaults:
    _crud_operation: edit
    _crud_surface: admin
  requirements:
    resourcePath: '(?!interfacing(?:/|$)|_profiler(?:/|$)|_wdt(?:/|$))[a-z0-9][a-z0-9/-]{0,120}'
    id: '[^/]+'

app_crud_delete:
  path: /{resourcePath}/delete/{id}
  controller: App\Interfacing\Presentation\Controller\Interfacing\GenericCrudWorkbenchController::show
  methods: [GET]
  defaults:
    _crud_operation: delete
    _crud_surface: admin
  requirements:
    resourcePath: '(?!interfacing(?:/|$)|_profiler(?:/|$)|_wdt(?:/|$))[a-z0-9][a-z0-9/-]{0,120}'
    id: '[^/]+'

app_crud_index:
  path: /{resourcePath}/
  controller: App\Interfacing\Presentation\Controller\Interfacing\GenericCrudWorkbenchController::show
  methods: [GET]
  defaults:
    _crud_operation: index
    _crud_surface: admin
  requirements:
    resourcePath: '(?!interfacing(?:/|$)|_profiler(?:/|$)|_wdt(?:/|$))[a-z0-9][a-z0-9/-]{0,120}'

app_crud_show:
  path: /{resourcePath}/{id}
  controller: App\Interfacing\Presentation\Controller\Interfacing\GenericCrudWorkbenchController::show
  methods: [GET]
  defaults:
    _crud_operation: show
    _crud_surface: admin
  requirements:
    resourcePath: '(?!interfacing(?:/|$)|_profiler(?:/|$)|_wdt(?:/|$))[a-z0-9][a-z0-9/-]{0,120}'
    id: '(?!summary$|meter$)[^/]+'
