parameters:
  env(SR_TENANT_DEFAULT): 'default'
  env(SR_BILLING_API_BASE): 'http://127.0.0.1'
  env(SR_BILLING_API_METER_PATH): '/billing/meter'
  env(SR_ORDER_API_BASE): 'http://127.0.0.1'
  env(SR_ORDER_API_SUMMARY_PATH): '/order/summary'
  env(INTERFACING_CATEGORY_API_BASE_URL): 'http://127.0.0.1:8080'
  env(INTERFACING_CATEGORY_API_TIMEOUT_MS): '2500'
  env(INTERFACING_CATEGORY_API_LIST_PATH): '/category/admin/category'
  env(INTERFACING_CATEGORY_API_READ_PATH): '/category/admin/category/{id}'
  env(INTERFACING_CATEGORY_API_SAVE_PATH): '/category/admin/category/{id}'
  interfacing.demo_user_profile_path: '%kernel.project_dir%/var/interfacing/demo-user-profile.json'

services:
  _defaults:
    autowire: true
    autoconfigure: true

  Psr\Log\NullLogger: ~

  App\Application\Security\InterfacingPermissionVoter:
    tags: ['security.voter']

  App\Integration\Twig\ClassNameTwigExtension:
    tags: ['twig.extension']

  App\Presentation\Controller\Interfacing\BillingMeterScreenController:
    tags: ['controller.service_arguments']

  App\Presentation\Controller\Interfacing\OrderSummaryScreenController:
    tags: ['controller.service_arguments']

  App\Presentation\Controller\Interfacing\InterfacingHealthController:
    tags: ['controller.service_arguments']

  App\Presentation\LiveComponent\Interfacing\Screen\ScreenEmptyComponent: ~

  App\Presentation\LiveComponent\Interfacing\Screen\ScreenFormDemoComponent: ~

  App\Presentation\LiveComponent\Interfacing\Screen\ScreenGridDemoComponent: ~

  App\Presentation\LiveComponent\Interfacing\Screen\ScreenHealthComponent: ~

  App\Presentation\LiveComponent\Interfacing\Screen\ScreenMetricDemoComponent: ~

  App\Presentation\LiveComponent\Interfacing\Screen\ScreenWizardDemoComponent: ~

  App\Service\Interfacing\Access\SymfonyAccessResolver: ~

  App\Service\Interfacing\Audit\MonologAuditSink:
    arguments:
      $logger: '@Psr\Log\NullLogger'

  App\Service\Interfacing\Context\SymfonyBaseContextProvider: ~

  App\Service\Interfacing\Query\HttpBillingMeterQueryService:
    arguments:
      $client: '@http_client'
      $baseUrl: '%env(string:SR_BILLING_API_BASE)%'
      $path: '%env(string:SR_BILLING_API_METER_PATH)%'

  App\Service\Interfacing\Query\HttpOrderSummaryQueryService:
    arguments:
      $client: '@http_client'
      $baseUrl: '%env(string:SR_ORDER_API_BASE)%'
      $path: '%env(string:SR_ORDER_API_SUMMARY_PATH)%'

  App\Service\Interfacing\Security\InterfacingPermissionNamer: ~

  App\Service\Interfacing\Tenant\DefaultTenantResolver:
    arguments:
      $defaultTenantId: '%env(string:SR_TENANT_DEFAULT)%'

  App\ServiceInterface\Interfacing\Query\BillingMeterQueryServiceInterface:
    alias: App\Service\Interfacing\Query\HttpBillingMeterQueryService

  App\ServiceInterface\Interfacing\Query\OrderSummaryQueryServiceInterface:
    alias: App\Service\Interfacing\Query\HttpOrderSummaryQueryService

  App\ServiceInterface\Interfacing\Access\AccessResolverInterface:
    alias: App\Service\Interfacing\Access\SymfonyAccessResolver

  App\ServiceInterface\Interfacing\Context\RequestBaseContextProviderInterface:
    alias: App\Service\Interfacing\Context\SymfonyBaseContextProvider

  App\ServiceInterface\Interfacing\Security\PermissionNamerInterface:
    alias: App\Service\Interfacing\Security\InterfacingPermissionNamer

  App\ServiceInterface\Interfacing\Tenant\TenantResolverInterface:
    alias: App\Service\Interfacing\Tenant\DefaultTenantResolver

  App\ServiceInterface\Support\Audit\AuditSinkInterface:
    alias: App\Service\Interfacing\Audit\MonologAuditSink
