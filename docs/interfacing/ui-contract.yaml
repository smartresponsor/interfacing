# Interfacing UI Contract (RVE-A1)
# - Explicit UI ↔ Service contracts for screens/routes.
# - This file documents shapes and constraints; it must not encode domain rules.
#
schema: smartresponsor.interfacing.ui-contract.v1
component: interfacing
version: 1.0.0

screens:
  - id: interfacing.doctor
    route:
      method: GET
      path: /interfacing/doctor
    internal: false
    output:
      content_type: text/html
      template: interfacing/doctor.html.twig
    error:
      - code: http.500
        when: unexpected_failure

  - id: interfacing.doctor.json
    route:
      method: GET
      path: /interfacing/doctor.json
    output:
      content_type: application/json
      shape: doctor_report_v1
    error:
      - code: http.500
        when: unexpected_failure

  - id: interfacing.metrics
    route:
      method: GET
      path: /interfacing/metrics
    output:
      content_type: text/plain
      shape: prometheus_exposition
    error:
      - code: http.500
        when: unexpected_failure

  - id: interfacing.health
    route:
      method: GET
      path: /interfacing/health
    input:
      query: {}
      path: {}
      body: null
    output:
      content_type: application/json
      shape:
        ok: bool
        service: string
        ts: string # DATE_ATOM
    error:
      - code: http.500
        when: unexpected_failure
    service_call:
      - kind: none

  - id: interfacing.layout.shell
    route:
      method: GET
      path: /interfacing/{slug}
      default:
        slug: home
    input:
      path:
        slug: string
      query: {}
      body: null
    output:
      content_type: text/html
      template: interfacing/layout/shell.html.twig
      view_model:
        layout: LayoutShell
        screenComponent: string
        screenContext: mixed # serialized as Twig-compatible array/scalar
    access:
      mode: guard
      guard: LayoutGuardInterface::canView
      token: security.token_storage.getToken()
      on_forbidden: http.403
    service_call:
      - kind: query
        name: LayoutCatalogInterface::findBySlug
        in: slug
        out: LayoutSpec|null
      - kind: query
        name: LayoutCatalogInterface::list
        out: LayoutSpec[]
      - kind: guard
        name: LayoutGuardInterface::canView
        in: LayoutSpec + Token|null
        out: bool
      - kind: build
        name: LayoutShellInterface::build
        in: LayoutSpec + LayoutSpec[]
        out: LayoutShell
      - kind: resolve
        name: InterfacingRuntimeInterface::resolveScreenComponentName
        in: LayoutId|ScreenId
        out: string
    error:
      - code: http.404
        when: unknown_layout_slug
      - code: http.403
        when: access_denied
      - code: http.500
        when: unexpected_failure

notes:
  error_semantics:
    codes:
      - ui.validation
      - ui.forbidden
      - ui.not-found
      - ui.unavailable
      - ui.timeout
      - ui.unexpected
    mapping:
      ui.validation: http.422
      ui.forbidden: http.403
      ui.not-found: http.404
      ui.unavailable: http.503
      ui.timeout: http.504
      ui.unexpected: http.500
  invariants:
    - Interfacing controllers must stay thin: orchestration only.
    - UI contracts describe I/O and error semantics, not business decisions.
    - Domain-level validation and policy must live outside Interfacing.
