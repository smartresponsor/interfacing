name: Indexing-agent-dispatch

on:
  workflow_dispatch:
    inputs:
      task:
        description: "plan|codex|pr"
        required: true
        default: "pr"
      kind:
        description: "fix|hotfix|feat|chore|docs|refactor"
        required: false
        default: "fix"
      message:
        description: "Short reason (used in PR title/body)"
        required: false
        default: "agent update"

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  agent:
    uses: ./.github/workflows/Indexing-agent-pr.yml
    with:
      task: ${{ inputs.task }}
      kind: ${{ inputs.kind }}
      message: ${{ inputs.message }}

