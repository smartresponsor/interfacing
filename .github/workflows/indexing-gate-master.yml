name: Indexing-gate-master

on:
  push:
    branches: [ "master" ]
    paths:
      - ".github/workflows/**"
      - "Domain/**"
      - "src/**"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "phpstan.neon"
      - "phpunit.xml.dist"
      - "docs/**"
      - "page/**"
  pull_request:
    branches: [ "master" ]
    paths:
      - ".github/workflows/**"
      - "Domain/**"
      - "src/**"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "phpstan.neon"
      - "phpunit.xml.dist"
      - "docs/**"
      - "page/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: [ "8.2" ]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: smartresponsor
          MYSQL_USER: smartresponsor
          MYSQL_PASSWORD: smartresponsor
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: smartresponsor
          POSTGRES_USER: smartresponsor
          POSTGRES_PASSWORD: smartresponsor
        options: >-
          --health-cmd="pg_isready -U smartresponsor"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SR_DOMAIN: "Indexing"
      MIN_COVERAGE: "80"

      PG_DSN: pgsql:host=127.0.0.1;port=5432;dbname=smartresponsor
      PG_USER: smartresponsor
      PG_PASS: smartresponsor

      MY_DSN: mysql:host=127.0.0.1;port=3306;dbname=smartresponsor
      MY_USER: smartresponsor
      MY_PASS: smartresponsor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          coverage: xdebug
          extensions: pdo_mysql, pdo_pgsql, intl, mbstring, zip
          ini-values: post_max_size=256M, memory_limit=2G

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Validate composer files
        run: composer validate --no-check-publish

      - name: Install composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Domain gate (strict)
        shell: pwsh
        env:
          SR_CANON_REQUIRED: "1"
          SR_GATE_STRICT: "1"
        run: |
          ./Domain/Tool/github-gate.ps1 -Domain "${env:SR_DOMAIN}"

      - name: Quality checks
        run: |
          composer phpstan
          composer psalm
          composer rector:dry

      - name: Unit tests with coverage threshold
        run: |
          vendor/bin/phpunit --coverage-clover build/logs/clover.xml --coverage-text | tee build/logs/coverage.txt

          COVERAGE=$(grep -Eo 'Lines:\s+[0-9]+(\.[0-9]+)?%' build/logs/coverage.txt | awk '{print $2}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"

          if [ -n "$COVERAGE" ] && [ "$(echo "$COVERAGE < $MIN_COVERAGE" | bc -l)" -eq 1 ]; then
            echo "Coverage below ${MIN_COVERAGE}%"
            exit 1
          fi

      - name: Migration smoke check
        run: |
          php bin/address-migrate
          php bin/address-projection-migrate

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Indexing-report
          path: report/
          if-no-files-found: ignore
