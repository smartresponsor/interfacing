name: Indexing-gate-master

on:
  push:
    branches: [ "master" ]
    paths:
      - ".github/workflows/**"
      - "Domain/**"
      - "src/**"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "phpstan.neon"
      - "phpunit.xml.dist"
      - "docs/**"
      - "page/**"
  pull_request:
    branches: [ "master" ]
    paths:
      - ".github/workflows/**"
      - "Domain/**"
      - "src/**"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "phpstan.neon"
      - "phpunit.xml.dist"
      - "docs/**"
      - "page/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  gate:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: [ "8.2" ]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: smartresponsor
          MYSQL_USER: smartresponsor
          MYSQL_PASSWORD: smartresponsor
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: smartresponsor
          POSTGRES_USER: smartresponsor
          POSTGRES_PASSWORD: smartresponsor
        options: >-
          --health-cmd="pg_isready -U smartresponsor"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SR_DOMAIN: "Indexing"
      MIN_COVERAGE: "80"

      PG_DSN: pgsql:host=127.0.0.1;port=5432;dbname=smartresponsor
      PG_USER: smartresponsor
      PG_PASS: smartresponsor

      MY_DSN: mysql:host=127.0.0.1;port=3306;dbname=smartresponsor
      MY_USER: smartresponsor
      MY_PASS: smartresponsor

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@d59004228537ca90c8dca680592a08a675bf52b6 # v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          coverage: none
          extensions: pdo_mysql, pdo_pgsql, intl, mbstring, zip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y bc

      - name: Cache Composer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Domain gate (strict)
        shell: pwsh
        env:
          SR_CANON_REQUIRED: "1"
          SR_GATE_STRICT: "1"
        run: |
          pwsh -NoProfile -File Domain/Tool/github-gate.ps1 -Domain "${SR_DOMAIN}"

      - name: Quality checks
        run: |
          composer phpstan
          composer psalm
          composer rector:dry

      - name: Unit tests with coverage threshold
        run: |
          vendor/bin/phpunit --coverage-clover build/logs/clover.xml --coverage-text | tee build/logs/coverage.txt

          COVERAGE=$(grep -Eo 'Lines:\s+[0-9]+(\.[0-9]+)?%' build/logs/coverage.txt | awk '{print $2}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"

          if [ -n "$COVERAGE" ] && [ "$(echo "$COVERAGE < $MIN_COVERAGE" | bc -l)" -eq 1 ]; then
            echo "Coverage below ${MIN_COVERAGE}%"
            exit 1
          fi

      - name: Migration smoke check
        run: |
          php bin/address-migrate
          php bin/address-projection-migrate

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Indexing-report
          path: report/
          if-no-files-found: ignore
