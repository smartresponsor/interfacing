name: Indexing-evidence-release

on:
  workflow_dispatch:
  push:
    tags:
      - "Indexing-*"

permissions:
  contents: write
  id-token: write
  attestations: write
  actions: write

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Install dependency
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Domain report (soft)
        shell: pwsh
        env:
          SR_DOMAIN: "Indexing"
          SR_CANON_REQUIRED: "0"
        run: |
          pwsh -NoProfile -File Domain/Tool/run.ps1 doctor -Domain "Indexing" -Repo "${{ github.workspace }}"
          $global:LASTEXITCODE = 0
          pwsh -NoProfile -File Domain/Tool/run.ps1 scan -Domain "Indexing"
          $global:LASTEXITCODE = 0
          pwsh -NoProfile -File Domain/Tool/run.ps1 health -Domain "Indexing" -Repo "${{ github.workspace }}"
          $global:LASTEXITCODE = 0
          pwsh -NoProfile -File Domain/Tool/run.ps1 validate -Domain "Indexing" -Repo "${{ github.workspace }}" -AllowMissing
          $global:LASTEXITCODE = 0
          exit 0

      - name: Evidence pack
        id: pack
        shell: pwsh
        env:
          SR_DOMAIN: "Indexing"
        run: |
          $kind = "run"
          $ref = ""
          if ("${{ github.ref_type }}" -eq "tag") {
            $kind = "tag"
            $ref = "${{ github.ref_name }}"
          }
          pwsh -NoProfile -File Domain/Tool/evidence-pack.ps1 -Domain "Indexing" -Kind $kind -Ref $ref -Train "${{ vars.SR_TRAIN }}"
          exit 0

      - name: Upload evidence to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.evidence_zip }}
          fail_on_unmatched_files: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.pack.outputs.evidence_zip }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Indexing-report
          path: report/
          if-no-files-found: ignore

