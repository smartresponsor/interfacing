name: automate-pack-sync

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 * * * *"
  repository_dispatch:
    types: [automate-pack-release, automater-pack-release, automate-kit-release, automater-kit-release]

permissions:
  contents: write

concurrency:
  group: automate-pack-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Normalize GitHub App private key
        id: key
        shell: bash
        env:
          KEY_PEM: ${{ secrets.AUTOMATER_APP_PRIVATE_KEY }}
          KEY_B64: ${{ secrets.AUTOMATER_APP_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          normalized=""
          if [ -n "${KEY_B64:-}" ]; then
            normalized="$(echo "$KEY_B64" | base64 -d)"
          else
            normalized="${KEY_PEM:-}"
          fi

          # Strip accidental surrounding quotes
          if [ "${normalized:0:1}" = '"' ] && [ "${normalized: -1}" = '"' ]; then
            normalized="${normalized:1:${#normalized}-2}"
          fi

          # Convert literal \n sequences into real newlines (common mistake when storing in secrets)
          normalized="${normalized//\\n/$'\n'}"

          # Remove CR characters (Windows newlines)
          normalized="${normalized//$'\r'/}"

          # Basic sanity check
          echo "$normalized" | head -n 1 | grep -q "BEGIN" || { echo "Private key missing BEGIN line"; exit 1; }
          echo "$normalized" | tail -n 1 | grep -q "END" || { echo "Private key missing END line"; exit 1; }

          echo "::add-mask::$normalized"
          delim="KEY_$(date +%s%N)"
          {
            echo "private-key<<$delim"
            echo "$normalized"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token (Automater)
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.AUTOMATER_APP_ID }}
          private-key: ${{ steps.key.outputs.private-key }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}

      - name: Setup git safe directory
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Sync packs (direct push)
        shell: pwsh
        env:
          # consumer engine expects GITHUB_TOKEN for push auth (now app token)
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}

          # read-only token for downloading source assets (if source is private)
          AUTOMATE_SOURCE_TOKEN: ${{ secrets.AUTOMATE_SOURCE_TOKEN }}

          # throttling + base branch
          AUTOMATER_PUSH_TIMER: ${{ vars.AUTOMATER_PUSH_TIMER }}
          AUTOMATER_BASE_BRANCH: ${{ vars.AUTOMATER_BASE_BRANCH }}

          # optional dispatch targeting
          AUTOMATER_TRIGGER_PACK_ID: ${{ github.event.client_payload.packId || '' }}
          AUTOMATER_TRIGGER_TAG: ${{ github.event.client_payload.tag || '' }}
        run: |
          pwsh -File ./.automation/tool/automater-pack-sync.ps1
