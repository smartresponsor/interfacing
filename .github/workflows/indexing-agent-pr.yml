name: Indexing-agent-pr

on:
  workflow_call:
    inputs:
      task:
        type: string
        required: true
        default: "pr"
      kind:
        type: string
        required: false
        default: "fix"
      message:
        type: string
        required: false
        default: "agent update"

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Install dependency
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run Domain tools (soft)
        shell: pwsh
        env:
          SR_DOMAIN: "Indexing"
          SR_CANON_REQUIRED: "0"
        run: |
          Set-Location "${{ github.workspace }}"

          pwsh -NoProfile -File Domain/Tool/run.ps1 doctor -Domain "Indexing" -Repo "${{ github.workspace }}"
          $global:LASTEXITCODE = 0

          pwsh -NoProfile -File Domain/Tool/run.ps1 scan -Domain "Indexing"
          $global:LASTEXITCODE = 0

          pwsh -NoProfile -File Domain/Tool/run.ps1 health -Domain "Indexing" -Repo "${{ github.workspace }}"
          $global:LASTEXITCODE = 0

          pwsh -NoProfile -File Domain/Tool/run.ps1 validate -Domain "Indexing" -Repo "${{ github.workspace }}" -AllowMissing
          $global:LASTEXITCODE = 0

          if ('${{ inputs.task }}' -eq 'plan') {
            pwsh -NoProfile -File Domain/Tool/run.ps1 plan -Domain "Indexing"
            $global:LASTEXITCODE = 0
          }

          if ('${{ inputs.task }}' -eq 'codex' -or '${{ inputs.task }}' -eq 'pr') {
            pwsh -NoProfile -File Domain/Tool/run.ps1 plan -Domain "Indexing"
            $global:LASTEXITCODE = 0
            pwsh -NoProfile -File Domain/Tool/run.ps1 codex -Domain "Indexing"
            $global:LASTEXITCODE = 0
          }

      - name: Prepare PR branch (task=pr)
        if: ${{ inputs.task == 'pr' }}
        shell: bash
        run: |
          set -euo pipefail
          ts="$(date -u +%Y%m%dT%H%M%SZ)"
          kind="${{ inputs.kind }}"
          kind="$(echo "$kind" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-' )"
          if [ -z "$kind" ]; then kind="fix"; fi
          br="ai/${kind}-${ts}"
          echo "KIND=$kind" >> "$GITHUB_ENV"
          echo "BRANCH=$br" >> "$GITHUB_ENV"
          git checkout -b "$br"

      - name: Commit allowlisted files (task=pr)
        if: ${{ inputs.task == 'pr' }}
        shell: bash
        run: |
          set -euo pipefail

          bad="$(git status --porcelain | awk '{print $2}' | grep -vE '^(Domain/|\.github/workflows/|docs/)' || true)"
          if [ -n "$bad" ]; then
            echo "Blocked paths detected:"
            echo "$bad"
            exit 2
          fi

          git add Domain/ .github/workflows/ docs/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi

          msg="${{ inputs.message }}"
          kind="${KIND:-fix}"
          git commit -m "${kind}: ${msg}"

      - name: Push branch (task=pr)
        if: ${{ inputs.task == 'pr' }}
        shell: bash
        run: |
          set -euo pipefail
          git push -u origin "$BRANCH"

      - name: Create PR (task=pr)
        if: ${{ inputs.task == 'pr' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          kind="${KIND:-fix}"
          title="${kind}: ${{ inputs.message }}"
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          cat > /tmp/pr_body.txt <<EOF
          Automated agent PR.

          - Task: ${{ inputs.task }}

          - Kind: ${KIND:-fix}
          - Run: $run_url
          EOF
          gh pr create --base master --head "$BRANCH" --title "$title" --body-file /tmp/pr_body.txt || true

      - name: Upload agent artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Indexing-agent-report
          path: report/
          if-no-files-found: ignore

