name: Indexing-ai-plan

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Optional label for context (e.g. master, feature branch, PR number). No checkout."
        required: false
        default: "master"
  issue_comment:
    types: [ created ]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  ai-plan:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/ai plan'))
    runs-on: ubuntu-latest
    steps:
      - name: Build no-AI plan artifact (no checkout)
        shell: pwsh
        run: |
          if (-not (Test-Path "report")) { New-Item -ItemType Directory -Force -Path "report" | Out-Null }

          $out = "report/Indexing-ai-plan.md"
          $ts = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $repo = "${{ github.repository }}"
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $actor = "${{ github.actor }}"
          $event = "${{ github.event_name }}"
          $target = "${{ inputs.target_ref }}"

          $issueNum = ""
          if ("${{ github.event_name }}" -eq "issue_comment") { $issueNum = "${{ github.event.issue.number }}" }

          $lines = @(
            "No-AI plan artifact (no checkout, no secrets).",
            "",
            "Generated: $ts",
            "Repo: $repo",
            "Actor: $actor",
            "Event: $event",
            "Target: $target",
            "Issue/PR: $issueNum",
            "Run: $runUrl",
            "",
            "A) What we are trying to achieve",
            "- Outcome:",
            "- Constraints:",
            "- Non-goals:",
            "",
            "B) Current signals (fill manually)",
            "- Gate: green/red",
            "- Docs build: ok/fail",
            "- Known blockers:",
            "",
            "C) Roadmap (RWE Envelopes)",
            "Envelope 1",
            "Goal:",
            "Slice: ATOM",
            "Limits: files_max=5, loc_max=600",
            "Canon: singular naming, mirror interface layers, EN-only comments, copyright header",
            "Inputs:",
            "Paths:",
            "Outputs:",
            "Acceptance Criteria:",
            "Notes:",
            "",
            "Envelope 2",
            "Goal:",
            "Slice: BUCKET",
            "Limits: files_max=16, loc_max=1200",
            "Canon: singular naming, mirror interface layers, EN-only comments, copyright header",
            "Inputs:",
            "Paths:",
            "Outputs:",
            "Acceptance Criteria:",
            "Notes:"
          )

          Set-Content -Path $out -Value $lines -Encoding UTF8
          Write-Host "OK: wrote $out"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: Indexing-ai-plan
          path: report/
          if-no-files-found: error

      - name: Comment PR (short)
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const body =
              "Indexing-ai-plan finished (no-AI, no checkout). " +
              "See workflow artifact: Indexing-ai-plan. " +
              "File: report/Indexing-ai-plan.md";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });
