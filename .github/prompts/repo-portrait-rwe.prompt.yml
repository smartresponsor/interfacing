name: Repo portrait + RWE roadmap (RU output)
description: Market portrait, readiness scorecard, growth points, RWE envelopes. Output in Russian.
model: openai/gpt-4o-mini
modelParameters:
  temperature: 0.2
  max_tokens: 1800
messages:
  - role: system
    content: |
      Hard rule (language):
      - Output MUST be in Russian (RU) for all narrative text.
      - Keep code, paths, globs, identifiers, and the Envelope schema field names in English exactly as written.
      - Do NOT use Markdown headings (#, ##, ###) and do NOT use bold text. Use plain labels like "A) ...", "B) ...".

      You are a repo auditor + product/market analyst + tech lead.
  - role: user
    content: |
      Task:
      1) Produce a market portrait of this component/repository.
      2) Compare against industry leaders (representative products/projects).
      3) Score readiness: Production Ready, Commercial Ready, Product Ready, Documents Ready, API Ready.
      4) Identify growth points and gaps.
      5) Build a roadmap as RWE technical envelopes that respect strict scope limits.

      Inputs:
      - Component/domain name: {{domain}}
      - Repo: {{repo}}
      - Target users / market: {{market}}
      - Deployment target: {{deploy}}
      - Languages/frameworks: {{stack}}
      - Current stage: {{stage}}

      Repository context note:
      The prompt editor doesn’t automatically pass repository content into prompts.
      If repo content is needed, it will be provided in {{repo_context}}.

      Repo context:
      {{repo_context}}

      Canon invariants (must enforce):
      - Single hyphen in filenames (no double hyphen)
      - Singular naming (no plurals) in paths, classes, APIs
      - Mirror interface layers: for each src/<Layer>/... there is src/<Layer>Interface/...
        Service interfaces MUST live in src/ServiceInterface/<Domain>/...
      - EN-only code comments and script messages
      - Copyright header in code files:
        "Copyright (c) 2025 Oleksandr Tishchenko / Marketing America Corp"
      - Default branch: master (origin/master)

      Output budget / chunking:
      - Max 8 envelopes per response.
      - Avoid long file listings. Prefer aggregated counts + top paths.
      - Stop with: "NEXT: go next" when more envelopes are needed.

      Required output format (strict, RU narrative, no markdown headings, no bold):
      A) Component portrait
      B) Market portrait
      C) Readiness scorecard
      D) Growth points
      E) Roadmap as RWE envelopes
      F) Next 3 prompts
testData:
  - domain: Indexing
    repo: taa0662621456/Indexing
    market: B2B infra / Indexing
    deploy: k8s
    stack: PHP 8.x + Symfony
    stage: RC
    repo_context: |
      Provide: repo tree (top 4 levels), CI workflows, docs index, API specs, deploy manifests.
evaluators:
  - name: Output should be Russian and start with A)
    string:
      startsWith: "A)"
