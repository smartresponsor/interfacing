proposal:
  - op: agent.required
    level: error
    scope:
      - "."
    note: root-contract violations need reasoning
    prompt: >
      Root-contract violation detected (consumer repo).
      Preserve mode logic: canonization repo => mode=canon; otherwise mode=consumer.
      Do NOT delete files blindly. Do NOT auto-move without explicit mapping.
      Prefer: move payload into allowed folders; keep required root-only items.
      Output: PR-ready patch + updated MANIFEST if needed.
